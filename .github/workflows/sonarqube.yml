name: SonarQube Analysis

on:
  push:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download SonarScanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-7.2.0.5079-linux-x64.zip
          unzip sonar-scanner.zip

      - name: Clean compiled files from source
        run: |
          find GUI-based-Algorithm-Calculator-master -name "*.class" -delete || true

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./sonar-scanner-7.2.0.5079-linux-x64/bin/sonar-scanner \
            -Dsonar.projectKey=GUI-Algorithm-Calculator \
            -Dsonar.projectName="GUI Algorithm Calculator" \
            -Dsonar.sources=GUI-based-Algorithm-Calculator-master \
            -Dsonar.exclusions=**/*.class,**/bin/** \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -X
